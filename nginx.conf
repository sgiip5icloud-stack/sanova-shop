# ==============================
# SANOVA SHOP — Nginx Config
# Copy file này vào: /etc/nginx/sites-available/sanova
# Rồi tạo symlink:   sudo ln -s /etc/nginx/sites-available/sanova /etc/nginx/sites-enabled/
# ==============================

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Sau khi cài Certbot, dòng này sẽ tự redirect sang HTTPS

    # Giới hạn upload size (ảnh sản phẩm)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Headers chuẩn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (nếu cần sau này)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Cache ảnh sản phẩm + static files
    location /assets/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
