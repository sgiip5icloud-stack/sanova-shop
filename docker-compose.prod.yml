services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sanova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${DB_NAME:-sanova_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Không expose port ra ngoài — chỉ app container truy cập được
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sanova}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-sanova}:${DB_PASSWORD:-change_me_strong_password}@postgres:5432/${DB_NAME:-sanova_db}
      PORT: 8080
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-sanova-admin-2024}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
